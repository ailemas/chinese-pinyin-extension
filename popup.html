<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinyin Overlay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">Chinese Reading Helper</p>
      <h1>Pinyin Overlay</h1>
      <p class="description">
        Select Chinese text on the page to show pinyin or an English gloss.
      </p>

      <section class="mode-card" aria-labelledby="mode-heading">
        <div class="mode-copy">
          <span id="mode-heading" class="toggle-label">Selection mode</span>
          <span class="toggle-help">Choose pinyin, English translation, or turn overlays off.</span>
        </div>

        <div class="mode-options" role="radiogroup" aria-labelledby="mode-heading">
          <label class="mode-option">
            <input type="radio" name="selection-mode" value="off" />
            <span>Off</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="selection-mode" value="pinyin" />
            <span>Pinyin</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="selection-mode" value="translation" />
            <span>English</span>
          </label>
        </div>
      </section>

      <button id="clear-button" class="clear-button" type="button">
        Clear page
      </button>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
